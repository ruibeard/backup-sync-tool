# Local Option H chunk-store harness (MinIO).
# Start: docker compose -f dev/minio/docker-compose.yml up -d
# Bootstrap bucket: ./dev/minio/bootstrap.sh
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  minio-data:
